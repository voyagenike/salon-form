<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyage Nike｜スタッフ管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px}
.wrap{max-width:900px;margin:0 auto;padding:1rem}
.header{background:#1a1a1a;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:1rem;border-radius:10px}
.header h1{font-size:16px;font-weight:600;flex:1}
.btn{background:none;border:1px solid #ddd;padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;color:#1a1a1a;display:inline-flex;align-items:center;gap:5px;font-family:inherit}
.btn:hover{background:#f0f0f0}
.btn-white{background:#fff;border-color:#fff;color:#1a1a1a}
.btn-print{background:#fff;color:#1a1a1a;border:none;padding:7px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #eee}
.stat-lbl{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600}
.status{display:flex;align-items:center;gap:8px;font-size:12px;color:#666;margin-bottom:1rem;padding:8px 12px;background:#fff;border-radius:8px;border:1px solid #eee}
.dot{width:7px;height:7px;border-radius:50%;background:#f59e0b;flex-shrink:0}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;color:#888;text-align:left;padding:8px 12px;border-bottom:1px solid #eee;background:#fff}
td{padding:12px;border-bottom:1px solid #f5f5f5;font-size:13px;vertical-align:middle}
tr:hover td{background:#fafafa;cursor:pointer}
.tbl-wrap{background:#fff;border-radius:10px;border:1px solid #eee;overflow:hidden;margin-bottom:1rem}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.tag-warn{background:#fef3c7;color:#92400e}
.tag-ok{background:#d1fae5;color:#065f46}
.tag-info{background:#dbeafe;color:#1e40af}
.detail{background:#fff;border-radius:10px;border:1px solid #eee;padding:1.25rem;margin-bottom:1rem}
.detail-top{display:flex;align-items:center;gap:12px;margin-bottom:1rem}
.avatar{width:44px;height:44px;border-radius:50%;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:17px;color:#1e40af;flex-shrink:0}
.dl{display:grid;grid-template-columns:110px 1fr;gap:6px 12px;font-size:13px;margin-bottom:1rem}
.dl dt{color:#888;font-weight:500}
.ai-box{background:#f9f9f9;border-radius:8px;padding:12px;margin-top:4px}
.ai-lbl{font-size:12px;font-weight:600;margin-bottom:6px;color:#444}
.ai-txt{font-size:13px;line-height:1.7;color:#1a1a1a}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid #ddd;border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{
  body{background:#fff}
  .no-print{display:none!important}
  .print-only{display:block!important}
  #print-area{display:block!important}
  body > *{display:none}
  #print-area{display:block;position:fixed;top:0;left:0;width:100%;padding:20px;font-family:'Hiragino Sans',sans-serif}
  .ph{text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #000}
  .ph h1{font-size:18px;font-weight:700;margin-bottom:3px}
  .ph p{font-size:10px;color:#555}
  .ps{margin-bottom:12px}
  .ps-t{font-size:12px;font-weight:700;background:#f0f0f0;padding:5px 8px;border-left:3px solid #000;margin-bottom:6px}
  .pr{display:grid;grid-template-columns:110px 1fr;font-size:11px;padding:3px 0;border-bottom:0.5px solid #eee}
  .pl{color:#555;font-weight:500}
  .pc{margin-bottom:5px;font-size:10px;padding:5px 7px;background:#f9f9f9;border-radius:3px}
  .pc-t{font-weight:600;margin-bottom:2px;font-size:11px}
  .pc-p{color:#555;line-height:1.5}
  .psign{margin-top:16px;padding-top:12px;border-top:1px solid #000;display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .psign-box{border-bottom:1px solid #000;padding-bottom:28px}
  .psign-lbl{font-size:10px;color:#555;margin-bottom:6px}
  .pfoot{margin-top:12px;text-align:center;font-size:9px;color:#888;border-top:0.5px solid #ccc;padding-top:6px}
}
</style>
</head>
<body>

<div id="print-area" style="display:none"></div>

<div class="wrap no-print">
<div class="header">
  <h1>📋 Voyage Nike　スタッフ管理</h1>
  <button class="btn-print" onclick="loadRecords()">🔄 更新</button>
  <button class="btn-print" onclick="exportCSV()">⬇ CSV</button>
</div>

<div class="status">
  <div class="dot" id="sdot"></div>
  <span id="stxt">接続中...</span>
</div>

<div class="stats">
  <div class="stat"><div class="stat-lbl">総顧客数</div><div class="stat-val" id="st-total">—</div></div>
  <div class="stat"><div class="stat-lbl">アレルギーあり</div><div class="stat-val" id="st-al">—</div></div>
  <div class="stat"><div class="stat-lbl">本日受付</div><div class="stat-val" id="st-today">—</div></div>
</div>

<div class="tbl-wrap">
<table>
  <thead><tr>
    <th style="width:120px">お名前</th>
    <th style="width:110px">電話番号</th>
    <th style="width:80px">受付日時</th>
    <th style="width:80px">アレルギー</th>
    <th style="width:60px">承諾</th>
  </tr></thead>
  <tbody id="tbody"><tr><td colspan="5" style="text-align:center;padding:2rem;color:#888"><span class="spinner"></span> 読み込み中...</td></tr></tbody>
</table>
</div>

<div id="detail-wrap"></div>
</div>

<script>
const SUPA_URL='https://uiwytympwslckwnzpygz.supabase.co';
const SUPA_KEY='sb_publishable_WoZc1MkcvKkoCTQdSucQyQ_SZtbIngh';
let allRecords=[];

async function supaFetch(path,opts={}){
  const res=await fetch(SUPA_URL+'/rest/v1/'+path,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})},...opts});
  if(!res.ok)throw new Error(await res.text());
  const t=await res.text();return t?JSON.parse(t):null;
}

async function loadRecords(){
  document.getElementById('sdot').style.background='#f59e0b';
  document.getElementById('stxt').textContent='読み込み中...';
  try{
    allRecords=await supaFetch('cartes?order=created_at.desc&limit=200')||[];
    renderTable();
    const today=new Date().toISOString().slice(0,10);
    document.getElementById('st-total').textContent=allRecords.length;
    document.getElementById('st-al').textContent=allRecords.filter(r=>r.allergy==='あり').length;
    document.getElementById('st-today').textContent=allRecords.filter(r=>r.visit_date===today).length;
    document.getElementById('sdot').style.background='#10b981';
    document.getElementById('stxt').textContent='Supabase接続済み — '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+'更新';
  }catch(e){
    document.getElementById('sdot').style.background='#ef4444';
    document.getElementById('stxt').textContent='接続エラー: '+e.message;
  }
}

function renderTable(){
  const tb=document.getElementById('tbody');
  if(!allRecords.length){tb.innerHTML='<tr><td colspan="5" style="text-align:center;padding:2rem;color:#888">データがありません</td></tr>';return;}
  tb.innerHTML=allRecords.map(r=>`<tr onclick="showDetail('${r.id}')">
    <td style="font-weight:600">${r.name}</td>
    <td>${r.tel}</td>
    <td style="font-size:11px;color:#888">${r.created_at?new Date(r.created_at).toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'—'}</td>
    <td>${r.allergy==='あり'?'<span class="tag tag-warn">⚠ あり</span>':r.allergy==='不明'?'<span class="tag tag-info">不明</span>':'<span class="tag tag-ok">なし</span>'}</td>
    <td>${r.consent?'<span class="tag tag-ok">済み</span>':'<span class="tag tag-warn">未完</span>'}</td>
  </tr>`).join('');
}

function showDetail(id){
  const r=allRecords.find(x=>x.id===id);if(!r)return;
  document.getElementById('detail-wrap').innerHTML=`
<div class="detail">
  <div class="detail-top">
    <div class="avatar">${r.name.charAt(0)}</div>
    <div>
      <div style="font-size:16px;font-weight:700">${r.name}</div>
      <div style="font-size:12px;color:#888;margin-top:2px">${r.kana||''} ／ ${r.gender||'性別未選択'} ／ ${r.dob||'生年月日未記入'}</div>
    </div>
    <button class="btn" style="margin-left:auto;background:#1a1a1a;color:#fff;border-color:#1a1a1a" onclick="printCarte('${r.id}')">🖨 印刷</button>
  </div>
  <dl class="dl">
    <dt>電話番号</dt><dd>${r.tel}</dd>
    <dt>来店日</dt><dd>${r.visit_date||'—'}</dd>
    <dt>来店きっかけ</dt><dd>${r.refs||'—'}</dd>
    <dt>お悩み・ご要望</dt><dd style="white-space:pre-wrap">${r.concern||'なし'}</dd>
    <dt>アレルギー</dt><dd>${r.allergy==='あり'?`<span class="tag tag-warn">⚠ あり：${r.altypes||'詳細未記入'}</span>`:r.allergy||'—'}</dd>
    <dt>頭皮・皮膚</dt><dd>${r.skin||'問題なし'}</dd>
    <dt>過去トラブル</dt><dd>${r.trouble||'なし'}</dd>
    <dt>施術承諾</dt><dd>${r.consent?'<span class="tag tag-ok">✓ 全項目同意</span>':'<span class="tag tag-warn">未同意あり</span>'}</dd>
  </dl>
  <div class="ai-box">
    <div class="ai-lbl">✨ AI要約 <span id="ai-spin" style="display:none" class="spinner"></span></div>
    <div class="ai-txt" id="ai-txt">${r.summary||'<span style="color:#aaa">未生成</span>'}</div>
    <button class="btn" style="margin-top:8px;font-size:12px" onclick="genAI('${r.id}')">${r.summary?'再生成':'AI要約を生成'}</button>
  </div>
</div>`;
}

function printCarte(id){
  const r=allRecords.find(x=>x.id===id);if(!r)return;
  const now=new Date().toLocaleDateString('ja-JP');
  const pa=document.getElementById('print-area');
  pa.innerHTML=`
<div class="ph"><h1>Voyage Nike　新規カルテ・施術承諾書</h1><p>〒171-0014 東京都豊島区池袋2-18-1 山鹿ビル2階　TEL 03-6914-3118　印刷日：${now}</p></div>
<div class="ps"><div class="ps-t">基本情報</div>
<div class="pr"><span class="pl">お名前</span><span>${r.name}（${r.kana||'ふりがな未記入'}）</span></div>
<div class="pr"><span class="pl">生年月日</span><span>${r.dob||'未記入'}</span></div>
<div class="pr"><span class="pl">性別</span><span>${r.gender||'未選択'}</span></div>
<div class="pr"><span class="pl">電話番号</span><span>${r.tel}</span></div>
<div class="pr"><span class="pl">来店日</span><span>${r.visit_date||'—'}</span></div>
<div class="pr"><span class="pl">来店きっかけ</span><span>${r.refs||'—'}</span></div>
<div class="pr"><span class="pl">お悩み・ご要望</span><span>${r.concern||'なし'}</span></div></div>
<div class="ps"><div class="ps-t">アレルギー・健康情報</div>
<div class="pr"><span class="pl">アレルギー</span><span>${r.allergy}${r.altypes?' （'+r.altypes+'）':''}</span></div>
<div class="pr"><span class="pl">頭皮・皮膚</span><span>${r.skin||'問題なし'}</span></div>
<div class="pr"><span class="pl">過去トラブル</span><span>${r.trouble||'なし'}</span></div></div>
<div class="ps"><div class="ps-t">施術承諾書</div>
<div style="font-size:10px;color:#555;line-height:1.6;margin-bottom:8px;padding:6px;background:#f9f9f9">安全な施術をお客様にご提供する為にご協力をお願いしております。下記の内容をご了承の上、施術を希望する事をご了承頂いております。</div>
<div class="pc"><div class="pc-t">① ブリーチ・カラー・パーマ・縮毛矯正による頭皮の異常</div><div class="pc-p">当社規定メニューでのブリーチ、ヘアカラー、パーマネントウェーブ、縮毛矯正、また、その他のカラー（眉カラー）で起きた頭皮の異常（荒れ、湿疹、かぶれ、その他異常）。</div></div>
<div class="pc"><div class="pc-t">② 毛髪ダメージによる施術困難</div><div class="pc-p">毛髪のダメージが著しく、スタイリストが困難だと判断したが、それでも尚施術を希望した場合。</div></div>
<div class="pc"><div class="pc-t">③ エクステンション・コーンロウ・ブレイズによる頭皮の異常</div><div class="pc-p">エクステンション、コーンロウ、ブレイズ、などで出来た頭皮の異常（荒れ、湿疹、かぶれ、その他異常）。</div></div>
<div class="pc"><div class="pc-t">④ 妊娠中の施術による体調異常</div><div class="pc-p">妊娠中に施術を行うにあたり、体調不良などの体の異常。</div></div>
<div class="pc"><div class="pc-t">⑤ お連れ様・お子様の怪我・火傷</div><div class="pc-p">お連れ様などの施術以外での怪我、又は火傷などをした場合。※施術の行わないお子様の同伴はおこなっておりませんのでご了承ください。</div></div>
<div class="pc"><div class="pc-t">⑥ 返金・仕上がり差異について</div><div class="pc-p">上記事項に対しての施術料の返金等は行っておりません。施術日から一週間のお直し保証期間がございますが、当店にご連絡を頂き、ご来店をお願いしております。</div></div>
<div class="pc"><div class="pc-t">⑦ 個人情報の取り扱いについて</div><div class="pc-p">ご記入いただいた個人情報は、施術管理・サービス向上の目的にのみ使用し、第三者への提供は行いません。</div></div>
<div style="margin-top:8px;font-size:11px;font-weight:700">承諾状況：${r.consent?'✓ 全項目同意済み':'未同意あり'}</div></div>
<div class="psign">
<div class="psign-box"><div class="psign-lbl">お客様署名</div></div>
<div class="psign-box"><div class="psign-lbl">日付：　　年　　月　　日</div></div>
</div>
<div class="pfoot">株式会社 voyage　〒171-0014 東京都豊島区池袋2-18-1 山鹿ビル2階　TEL 03-6914-3118</div>`;
  pa.style.display='block';
  setTimeout(()=>{window.print();pa.style.display='none';},300);
}

async function genAI(id){
  const r=allRecords.find(x=>x.id===id);if(!r)return;
  document.getElementById('ai-spin').style.display='inline-block';
  document.getElementById('ai-txt').innerHTML='<span style="color:#aaa">生成中...</span>';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`美容室スタッフ向けに3〜4行で要約。アレルギー優先。\n氏名:${r.name} 性別:${r.gender||'不明'} 電話:${r.tel}\nお悩み:${r.concern||'なし'}\nアレルギー:${r.allergy}${r.altypes?' ('+r.altypes+')':''}\n頭皮:${r.skin||'問題なし'}\nトラブル:${r.trouble||'なし'}`}]})});
    const json=await res.json();
    const summary=json.content?.map(b=>b.text||'').join('')||'取得できませんでした。';
    await supaFetch('cartes?id=eq.'+id,{method:'PATCH',body:JSON.stringify({summary})});
    r.summary=summary;
    document.getElementById('ai-txt').textContent=summary;
  }catch(e){
    document.getElementById('ai-txt').innerHTML='<span style="color:red">エラー</span>';
  }finally{document.getElementById('ai-spin').style.display='none';}
}

function exportCSV(){
  if(!allRecords.length){alert('データがありません。');return;}
  const h=['氏名','ふりがな','性別','生年月日','電話番号','来店日','来店きっかけ','お悩み','アレルギー','アレルギー詳細','頭皮・皮膚','過去トラブル','承諾','AI要約'];
  const rows=allRecords.map(r=>[r.name,r.kana||'',r.gender||'',r.dob||'',r.tel,r.visit_date||'',r.refs||'',r.concern||'',r.allergy||'',r.altypes||'',r.skin||'',r.trouble||'',r.consent?'同意':'未同意',r.summary||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[h.map(v=>`"${v}"`).join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='voyagenike_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}

loadRecords();
</script>
</body>
</html>
